# Production profile — Railway, Render, etc. Activate with SPRING_PROFILES_ACTIVE=prod

spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# Trust X-Forwarded-* from platform load balancers (HTTPS, client IP)
server.forward-headers-strategy=framework

# Hide API explorer and OpenAPI JSON in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator: only health for platform probes; no details without auth
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

logging.level.root=INFO
logging.level.com.auradev.erp=INFO

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
